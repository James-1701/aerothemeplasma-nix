name: "Build with Cachix"
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake update
      - uses: cachix/cachix-action@v15
        with:
          name: aerothemeplasma
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build .#aeroglassblur .#smodglow # kwin effects
      - run: nix build .#desktopcontainment .#notifications .#sevenstart .#seventasks .#systemtray .#volume # plasmoids
      - run: nix build .#aeroglasspane .#linver # software